<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול כלכלי משפחת טולדנו</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <div id="app-loader" class="app-loader">
    <div class="loader-box">
      <div class="loader-spinner"></div>
      <p>מתחבר לענן…</p>
    </div>
  </div>

  <button id="dark-mode-btn" class="dark-mode-btn" title="מצב לילה / יום">🌙</button>

  <header>
    <div class="header-inner">
      <div class="header-icon">👨‍👩‍👧‍👦</div>
      <div>
        <h1>ניהול כלכלי משפחת טולדנו</h1>
        <p class="subtitle">מעקב חכם אחר הכנסות והוצאות המשפחה</p>
      </div>
    </div>
  </header>

  <main>
    <section class="summary-grid">
      <div class="card income-card">
        <span class="card-icon income-arrow">▲</span>
        <div class="card-content">
          <h3>סך הכנסות</h3>
          <p id="total-income">₪0</p>
        </div>
      </div>
      <div class="card expense-card">
        <span class="card-icon expense-arrow">▼</span>
        <div class="card-content">
          <h3>סך הוצאות</h3>
          <p id="total-expenses">₪0</p>
        </div>
      </div>
      <div class="card balance-card">
        <span class="card-icon balance-sym">₪</span>
        <div class="card-content">
          <h3>יתרה</h3>
          <p id="balance">₪0</p>
        </div>
      </div>
    </section>

    <section class="form-section wood-panel">
      <h2>✏️ הוסף תנועה חדשה</h2>
      <form id="transaction-form">
        <div class="form-grid">
          <div class="form-group">
            <label for="transaction-name">תיאור</label>
            <input type="text" id="transaction-name" placeholder="לדוגמה: משכורת" required />
          </div>
          <div class="form-group">
            <label for="transaction-amount">סכום (₪)</label>
            <input type="number" id="transaction-amount" placeholder="0.00" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="transaction-category">קטגוריה</label>
            <select id="transaction-category"></select>
          </div>
        </div>
        <div class="type-toggle-row">
          <button type="button" class="type-btn expense-btn active" id="type-btn-expense">
            <span class="type-arrow">↓</span> הוצאה
          </button>
          <button type="button" class="type-btn income-btn" id="type-btn-income">
            <span class="type-arrow">↑</span> הכנסה
          </button>
        </div>
        <button type="submit" class="btn-add">הוסף תנועה</button>
      </form>
    </section>

    <section class="chart-section wood-panel">
      <h2>📊 פילוח הוצאות</h2>
      <div class="chart-wrap">
        <canvas id="pie-chart"></canvas>
      </div>
      <p id="chart-empty-msg" class="chart-empty">אין נתונים להצגה</p>
    </section>

    <section class="table-section wood-panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2>📋 היסטוריית תנועות</h2>
        <button id="export-excel-btn" class="btn-add-sm" style="background: #1D6F42; border-color: #155231;">📊 ייצוא לאקסל</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>תיאור</th>
              <th>קטגוריה</th>
              <th>סוג</th>
              <th>סכום</th>
              <th>תאריך</th>
              <th>פעולה</th>
            </tr>
          </thead>
          <tbody id="transactions-body"></tbody>
        </table>
        <div id="empty-state" class="empty-state">
          <p>אין תנועות כרגע</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>ניהול כלכלי משפחת טולדנו &copy; 2026</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
