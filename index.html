<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ניהול הון | משפחת טולדנו</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div id="app-loader" class="app-loader">
        <div class="loader-box"><p>מתחבר למערכת...</p></div>
    </div>

    <header>
        <h1>משפחת טולדנו | ניהול הון</h1>
        <div class="month-selector-wrap">
            <select id="month-filter" class="month-select"></select>
        </div>
    </header>

    <main class="dashboard-layout">
        <section class="summary-grid">
            <div class="card income-card"><h3>הכנסות</h3><p id="total-income">₪0</p></div>
            <div class="card expense-card"><h3>הוצאות</h3><p id="total-expenses">₪0</p></div>
            <div class="card balance-card"><h3>יתרה</h3><p id="balance">₪0</p></div>
        </section>

        <div class="center-content">
            <div class="chart-wrap">
                <canvas id="pie-chart"></canvas>
            </div>
        </div>
    </main>

    <div id="modal-form" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('modal-form')">×</span>
            <h2 class="panel-title">תיעוד תנועה חדשה</h2>
            <form id="transaction-form">
                <div class="form-group">
                    <label>תיאור</label>
                    <input type="text" id="transaction-name" placeholder="לדוגמה: סופר" list="descriptions-list" required />
                </div>
                <div class="form-group">
                    <label>סכום</label>
                    <input type="number" id="transaction-amount" step="0.01" required />
                </div>
                <div class="form-group">
                    <label>קטגוריה</label>
                    <select id="transaction-category"></select>
                </div>
                <div class="type-toggle-row">
                    <button type="button" class="type-btn expense-btn active" id="type-btn-expense">הוצאה</button>
                    <button type="button" class="type-btn income-btn" id="type-btn-income">הכנסה</button>
                </div>
                <button type="submit" class="btn-add">שמור נתונים</button>
            </form>
        </div>
    </div>

    <div id="modal-table" class="modal">
        <div class="modal-content modal-large">
            <span class="close-modal" onclick="closeModal('modal-table')">×</span>
            <div class="modal-header-row" style="display:flex; justify-content:space-between; align-items:center;">
                <h2>פירוט תנועות</h2>
                <div class="export-btns">
                    <button id="export-excel-btn" class="btn-tool">Excel</button>
                    <button id="export-pdf-btn" class="btn-tool">PDF</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('description')">תיאור ↕</th>
                            <th onclick="sortTable('amount')">סכום ↕</th>
                            <th onclick="sortTable('date')">תאריך ↕</th>
                            <th>פעולה</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="floating-controls">
        <button class="fab btn-list-float" id="open-table-btn">☰</button>
        <button class="fab btn-add-float" id="open-form-btn">+</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
