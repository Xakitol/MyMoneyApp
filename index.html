<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול כלכלי משפחת טולדנו</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Scribble&family=Rubik:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <div id="app-loader" class="app-loader">
    <div class="loader-box">
      <p>מתחבר לענן…</p>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <h1>ניהול כלכלי משפחת טולדנו</h1>
      <div class="month-selector-wrap">
        <span>צפייה בחודש:</span>
        <select id="month-filter" class="month-select"></select>
      </div>
    </div>
  </header>

  <main>
    <section class="summary-grid">
      <div class="card income-card">
        <h3>סך הכנסות ▲</h3>
        <p id="total-income">₪0</p>
      </div>
      <div class="card expense-card">
        <h3>סך הוצאות ▼</h3>
        <p id="total-expenses">₪0</p>
      </div>
      <div class="card balance-card">
        <h3>יתרה ₪</h3>
        <p id="balance">₪0</p>
      </div>
    </section>

    <section class="wood-panel budget-targets">
      <h2 class="panel-title">🎯 יעד חיסכון והשקעה חודשי</h2>
      <div class="target-container">
        <div class="target-info">
          <span>התקדמות ליעד (2,500 ₪)</span>
          <span id="target-percentage">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="target-progress-fill" class="progress-bar-fill"></div>
        </div>
        <p id="target-message" class="target-message"></p>
      </div>
    </section>

    <section class="wood-panel form-section">
      <h2 class="panel-title">✏️ הוסף תנועה חדשה</h2>
      <form id="transaction-form">
        <div class="form-grid">
          <div class="form-group">
            <label>תיאור</label>
            <input type="text" id="transaction-name" placeholder="לדוגמה: משכורת" required />
          </div>
          <div class="form-group">
            <label>סכום (₪)</label>
            <input type="number" id="transaction-amount" placeholder="0.00" step="0.01" required />
          </div>
          <div class="form-group">
            <label>קטגוריה</label>
            <select id="transaction-category"></select>
          </div>
        </div>
        <div class="type-toggle-row">
          <button type="button" class="type-btn expense-btn active" id="type-btn-expense">↓ הוצאה</button>
          <button type="button" class="type-btn income-btn" id="type-btn-income">↑ הכנסה</button>
        </div>

        <div class="recurring-row">
          <label class="checkbox-container">
            <input type="checkbox" id="transaction-recurring">
            <span class="checkmark"></span>
            תנועה קבועה (תתווסף בכל חודש)
          </label>
        </div>

        <button type="submit" class="btn-add">הוסף תנועה</button>
      </form>
    </section>

    <section class="wood-panel chart-section">
      <h2 class="panel-title">📊 פילוח הוצאות</h2>
      <div class="chart-wrap">
        <canvas id="pie-chart"></canvas>
      </div>
      <p id="chart-empty-msg" class="chart-empty">אין נתונים להצגה</p>
    </section>

    <section class="wood-panel table-section">
      <div class="table-header-row">
        <h2 class="panel-title">📋 היסטוריית תנועות</h2>
        <div class="table-controls">
          <input type="text" id="search-input" placeholder="🔍 חפש תנועה..." class="search-field">
          <button id="export-pdf-btn" class="btn-tool btn-pdf">PDF</button>
          <button id="export-excel-btn" class="btn-tool btn-excel">Excel</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>תיאור</th>
              <th>קטגוריה</th>
              <th>סוג</th>
              <th>סכום</th>
              <th>תאריך</th>
              <th>פעולה</th>
            </tr>
          </thead>
          <tbody id="transactions-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
